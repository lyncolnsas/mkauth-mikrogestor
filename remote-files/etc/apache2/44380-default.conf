Listen 44380

<VirtualHost *:44380>
	ServerAdmin suporte@mk-auth.com.br
	ServerName localhost
	DocumentRoot /opt/mk-auth/retorno/

	<Directory /opt/mk-auth/retorno>
		<FilesMatch "\.(hhvm|php)$">
			SetHandler "proxy:unix:/run/php-retorno.sock|fcgi://localhost/"
		</FilesMatch>
		Options Indexes FollowSymLinks Includes ExecCGI
		AllowOverride All
		Order deny,allow
		Require all granted
		Deny from all
		Allow from 127.0.0.1
		Allow from localhost
	</Directory>

	ErrorLog /var/log/apache2/error44380.log
	LogLevel crit
	CustomLog /var/log/apache2/access44380.log combined

	Alias /retorno /opt/mk-auth/retorno/
	Alias / /opt/mk-auth/retorno/

	SetEnvIf Authorization "(.*)" HTTP_AUTHORIZATION=$1
</VirtualHost>

# vim: syntax=apache ts=4 sw=4 sts=4 sr noet
