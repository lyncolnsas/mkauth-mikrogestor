<VirtualHost *:80>
    ServerAdmin suporte@mk-auth.com.br

	DocumentRoot /var/www
	<Directory />
		Options FollowSymLinks
		AllowOverride all
	</Directory>

	<Directory /var/www/>
		<FilesMatch "\.(hhvm|php)$">
			SetHandler "proxy:unix:/run/php-publico.sock|fcgi://localhost/"
		</FilesMatch>
		Options Indexes FollowSymLinks Includes
		AllowOverride all
		Order allow,deny
		allow from all

		Header unset X-Powered-By

		# Config bandwidth limitation 500Kbps
		#BandwidthModule On
		#Bandwidth all 504800
	</Directory>

	ErrorLog /var/log/apache2/error.log

	# Possible values include: debug, info, notice, warn, error or crit
	# alert, emerg.
	LogLevel crit
	CustomLog /var/log/apache2/access.log combined

	ExpiresActive On
	<FilesMatch "\.(gif|jpg|jpeg|png|css|txt|js|GIF|JPG|JPEG|PNG|CSS|TXT|JS)$">
		ExpiresDefault "access plus 3600 seconds"
	</FilesMatch>

	SetEnvIf Authorization "(.*)" HTTP_AUTHORIZATION=$1
</VirtualHost>

<VirtualHost *:81>
    ServerAdmin suporte@mk-auth.com.br
    ServerName localhost
    DocumentRoot /opt/mk-auth/paginas/night/

	ErrorLog /dev/null
	LogLevel crit
	CustomLog /dev/null combined

	Alias /mkfiles /opt/mk-auth/mkfiles/
	Alias / /opt/mk-auth/paginas/night/

	SetEnvIf Authorization "(.*)" HTTP_AUTHORIZATION=$1
</VirtualHost>

