Listen 44381

<VirtualHost *:44381>
	ServerAdmin suporte@mk-auth.com.br
	ServerName localhost
	DocumentRoot /opt/mk-auth/api/

	<Directory /opt/mk-auth/api>
		Options Indexes FollowSymLinks Includes ExecCGI
		AllowOverride All
		Order deny,allow
		Require all granted
		Deny from all
		Allow from 127.0.0.1
		Allow from localhost
	</Directory>

	ErrorLog /var/log/apache2/error44381.log
	LogLevel crit
	CustomLog /var/log/apache2/access44381.log combined

	Alias /api /opt/mk-auth/api/
	Alias / /opt/mk-auth/api/

	SetEnvIf Authorization "(.*)" HTTP_AUTHORIZATION=$1
</VirtualHost>

# vim: syntax=apache ts=4 sw=4 sts=4 sr noet
