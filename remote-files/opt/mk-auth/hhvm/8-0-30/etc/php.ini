[PHP]

; Arquivo de configuracao do PHP, define comportamento e opcoes
; Documentacao: http://php.net/configuration.file
; Diretivas: nome=valor, case-sensitive, valores podem ser strings, numeros, constantes

;;;;;;;;;;;;;;;;;;;;
; Opcoes do php.ini
;;;;;;;;;;;;;;;;;;;;

; Define o nome do arquivo .user.ini para configuracoes do usuario
;user_ini.filename = ".user.ini"

; TTL para arquivos .user.ini em segundos
;user_ini.cache_ttl = 300

; Define o caminho para o arquivo de configuracao principal
sysconfdir = "/usr/local/etc/php"

; Define o diretorio para arquivos de configuracao adicionais
sysconfdir_scan_dir = "/usr/local/etc/php/conf.d"

;;;;;;;;;;;;;;;;;;;;
; Opcoes de Idioma
;;;;;;;;;;;;;;;;;;;;

; Ativa o motor PHP no Apache
engine = On

; Desativa tags curtas <? para compatibilidade XML
short_open_tag = Off

; Define precisao de numeros de ponto flutuante
precision = 14

; Ativa buffer de saida para melhor desempenho
output_buffering = 4096

; Compressao de saida com zlib, desativada por padrao
zlib.output_compression = Off

; Desativa flush automatico apos cada saida
implicit_flush = Off

; Define precisao para serializacao de floats
serialize_precision = -1

; Limita operacoes de arquivo a diretorios especificados
;open_basedir =

; Desativa funcoes especificas por seguranca
disable_functions =

; Desativa classes especificas por seguranca
disable_classes =

; Ativa o coletor de referencias circulares
zend.enable_gc = On

; Desativa exposicao do PHP no cabecalho do servidor
expose_php = Off

;;;;;;;;;;;;;;;;;;;
; Limites de Recursos
;;;;;;;;;;;;;;;;;;;;

; Tempo maximo de execucao de um script em segundos
max_execution_time = 3000

; Tempo maximo para parsing de dados de requisicao
max_input_time = 600

; Limite de variaveis de entrada (GET/POST/COOKIE)
max_input_vars = 100000

; Limite de memoria por script
memory_limit = 2048M

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Tratamento de Erros e Logs
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

; Define nivel de erros reportados
error_reporting = E_ALL & ~E_DEPRECATED

; Desativa exibicao de erros na saida
display_errors = Off

; Desativa exibicao de erros de inicializacao
display_startup_errors = Off

; Ativa log de erros
log_errors = On

; Define tamanho maximo de mensagens de erro em log
log_errors_max_len = 1024

; Desativa log de erros repetidos na mesma linha/arquivo
ignore_repeated_errors = Off

; Ignora origem de erros repetidos
ignore_repeated_source = Off

; Ativa relatorio de vazamentos de memoria
report_memleaks = On

; Desativa armazenamento da ultima mensagem de erro
track_errors = Off

; Ativa links HTML em mensagens de erro
html_errors = On

; Define caminho para logs de erro
;error_log = "/var/log/syslog"

;;;;;;;;;;;;;;;;;
; Manipulacao de Dados
;;;;;;;;;;;;;;;;;

; Define ordem de registro das variaveis superglobais
variables_order = "GPCS"

; Define ordem de registro da superglobal REQUEST
request_order = "GP"

; Desativa registro de $argc e $argv
register_argc_argv = Off

; Ativa criacao tardia de variaveis SERVER e ENV
auto_globals_jit = On

; Define tamanho maximo de dados POST
post_max_size = 3G

; Desativa magic quotes para GET/POST/COOKIE
magic_quotes_gpc = Off

; Define tipo MIME padrao para saida
default_mimetype = "text/html"

; Define codificacao padrao
default_charset = "UTF-8"

;;;;;;;;;;;;;;;;;;;;;;;;;
; Caminhos e Diretorios
;;;;;;;;;;;;;;;;;;;;;;;;;

; Define caminhos para inclusao de arquivos
include_path = ".:/opt/mk-auth/include"

; Diretorio temporario para uploads
upload_tmp_dir = "/var/tmp"

;;;;;;;;;;;;;;;;
; Uploads de Arquivos
;;;;;;;;;;;;;;;;

; Ativa upload de arquivos via HTTP
file_uploads = On

; Tamanho maximo de arquivos enviados
upload_max_filesize = 3G

; Numero maximo de arquivos por requisicao
max_file_uploads = 10

;;;;;;;;;;;;;;;;;;
; Wrappers Fopen
;;;;;;;;;;;;;;;;;;

; Ativa tratamento de URLs como arquivos
allow_url_fopen = On

; Desativa inclusao de URLs em include/require
allow_url_include = Off

; Define timeout padrao para streams baseados em socket
default_socket_timeout = 60

;;;;;;;;;;;;;;;;;;;;;;
; Extensoes Dinamicas
;;;;;;;;;;;;;;;;;;;;;;

; Define caminhos para extensoes
extension_dir = "/opt/mk-auth/hhvm/8-0-30/etc/ext/"

; Desativa carregamento dinamico de extensoes
enable_dl = Off

; Ativar conforme necessario
;extension=

;;;;;;;;;;;;;;;;;;;
; Configuracoes de Modulos
;;;;;;;;;;;;;;;;;;;

[CLI Server]
; Ativa cores no terminal do servidor CLI
cli_server.color = On

[Date]
; Define fuso horario padrao
date.timezone = "America/Sao_Paulo"

[Session]
; Define manipulador de armazenamento de sessoes
session.save_handler = files

; Define caminho para armazenamento de sessoes
session.save_path = "/var/tmp"

; Desativa modo estrito de sessao
session.use_strict_mode = 0

; Ativa uso de cookies para sessoes
session.use_cookies = 1

; Define nome do cookie de sessao
session.name = MKASESSID

; Desativa inicializacao automatica de sessoes
session.auto_start = 0

; Define cookie como httpOnly
session.cookie_httponly = On

; Define manipulador de serializacao
session.serialize_handler = php

; Desativa probabilidade de coleta de lixo
session.gc_probability = 0

; Define divisor para coleta de lixo
session.gc_divisor = 1000

; Define tempo de vida maximo de sessoes
session.gc_maxlifetime = 1440

; Define limitador de cache HTTP
session.cache_limiter = nocache

; Define expiracao do cache em minutos
session.cache_expire = 180

; Desativa suporte a trans sid
session.use_trans_sid = 0

; Define comprimento do ID de sessao
session.sid_length = 26

; Define bits por caractere no ID de sessao
session.sid_bits_per_character = 5

[Assertion]
; Desativa compilacao de assercoes
zend.assertions = -1

[soap]
; Ativa cache de WSDL
soap.wsdl_cache_enabled=1

; Define diretorio para cache de WSDL
soap.wsdl_cache_dir="/var/tmp"

; Define TTL do cache de WSDL
soap.wsdl_cache_ttl=86400

; Define limite de arquivos WSDL em cache
soap.wsdl_cache_limit = 5

[ldap]
; Define numero maximo de links abertos
ldap.max_links = -1

;;;;;;;;;;;;;;;;;;;;
; Opcoes OPCACHE
;;;;;;;;;;;;;;;;;;;;

[opcache]
; Ativa o OPcache
opcache.enable=1
opcache.enable_cli=1
opcache.memory_consumption=128
opcache.interned_strings_buffer=8
opcache.max_accelerated_files=10000
opcache.revalidate_freq=2
opcache.fast_shutdown=1
opcache.enable_file_override=0
