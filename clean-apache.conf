<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www

    # Tratar .hhvm como PHP
    AddType application/x-httpd-php .hhvm

    <Directory /var/www/>
        Options +FollowSymLinks -Indexes
        AllowOverride All
        Require all granted
        DirectoryIndex index.php index.html index.hhvm login.php login.hhvm
        
        # Ajustar include_path para encontrar classes do MK-Auth
        php_value include_path ".:/opt/mk-auth/:/opt/mk-auth/libs/:/opt/mk-auth/include/:/usr/share/php"
        php_flag display_errors on
        php_admin_flag log_errors on
        php_admin_value error_log /var/log/apache2/php_errors.log
    </Directory>

    # Alias para a Central do Assinante e Admin (que estãm em /opt/mk-auth)
    Alias /central /opt/mk-auth/central
    Alias /admin /opt/mk-auth/admin
    Alias /api /opt/mk-auth/api
    Alias /boleto /opt/mk-auth/boleto
    Alias /paginas /opt/mk-auth/paginas
    Alias /mkfiles /opt/mk-auth/mkfiles
    # Configuração dos Diretórios com FPM Sockets (Padrão MK-Auth original)
    <Directory /opt/mk-auth/admin>
        <FilesMatch "\.(hhvm|php)$">
            SetHandler "proxy:unix:/run/php-admin.sock|fcgi://localhost/"
        </FilesMatch>
    </Directory>

    <Directory /opt/mk-auth/central>
        <FilesMatch "\.(hhvm|php)$">
            SetHandler "proxy:unix:/run/php-central.sock|fcgi://localhost/"
        </FilesMatch>
    </Directory>

    <Directory /opt/mk-auth/api>
        <FilesMatch "\.(hhvm|php)$">
            SetHandler "proxy:unix:/run/php-api.sock|fcgi://localhost/"
        </FilesMatch>
    </Directory>

    <Directory /opt/mk-auth/boleto>
        <FilesMatch "\.(hhvm|php)$">
            SetHandler "proxy:unix:/run/php-boleto.sock|fcgi://localhost/"
        </FilesMatch>
    </Directory>

    <Directory /opt/mk-auth/paginas>
        <FilesMatch "\.(hhvm|php)$">
            SetHandler "proxy:unix:/run/php-publico.sock|fcgi://localhost/"
        </FilesMatch>
    </Directory>

    <Directory /opt/mk-auth/>
        Options +FollowSymLinks -Indexes
        AllowOverride All
        DirectoryIndex index.php index.html index.hhvm login.php login.hhvm
        Require all granted
    </Directory>

    # Removido redirecionamento hardcoded para permitir que o DirectoryIndex cuide da página inicial

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
